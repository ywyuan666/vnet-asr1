# ==============================================================================
#  docker-compose.yml —— 一键编排：构建镜像 + 挂载模型 + 端口映射
# ------------------------------------------------------------------------------
#  用法：
#    docker compose up -d          # 后台启动，浏览器打开 http://localhost:8000
#    docker compose logs -f        # 看日志
#    docker compose down           # 停止并删除容器
# ==============================================================================
services:
  asr-demo:
    build: .
    image: conformer-asr-demo:latest
    container_name: conformer-asr-demo
    ports:
      - "8000:8000"
    volumes:
      # 模型通过 volume 挂载（代码与数据分离，换模型不用重建镜像）
      - ./exp:/app/exp
      - ./data:/app/data
    environment:
      - DECODE_MODE=attention          # 可选: attention / transducer / ctc_greedy
      - MODEL_DIR=/app/exp/conformer_ctc_attn_transducer
      - DICT_PATH=/app/data/dict/units.txt
      - CMVN_PATH=/app/data/train/global_cmvn
      - CHECKPOINT=/app/exp/conformer_ctc_attn_transducer/best.pt
    restart: unless-stopped
