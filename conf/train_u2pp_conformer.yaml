# ============================================================
#  U2++ Conformer 训练配置（安克耳机语音指令识别）
# ------------------------------------------------------------
#  U2++ = Unified Streaming/Non-streaming Two-pass ++
#  组成：Conformer 编码器 + CTC 分支 + 双向(bitransformer)注意力解码器
#  说明：模型参数已调小，方便在 CPU / 小数据集上较快训练。
#        想要更强效果可把 output_size / num_blocks / linear_units 调大。
# ============================================================

# -------- 编码器：Conformer（自注意力 + 卷积） --------
encoder: conformer
encoder_conf:
    output_size: 144            # 编码器隐藏维度
    attention_heads: 4          # 多头注意力头数
    linear_units: 1024          # 前馈层维度
    num_blocks: 6               # Conformer 层数（标准 U2++ 常用 12）
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.0
    input_layer: conv2d         # 前端 2 次下采样(4x)
    normalize_before: true
    cnn_module_kernel: 15       # 卷积模块卷积核
    use_cnn_module: true
    activation_type: swish
    pos_enc_layer_type: rel_pos        # 相对位置编码
    selfattention_layer_type: rel_selfattn
    causal: true                # 因果卷积 → 支持流式
    use_dynamic_chunk: true     # 动态 chunk → 流式/非流式统一训练
    cnn_module_norm: layer_norm
    use_dynamic_left_chunk: false

# -------- 解码器：bitransformer（双向：左→右 + 右→左）--------
decoder: bitransformer
decoder_conf:
    attention_heads: 4
    linear_units: 1024
    num_blocks: 3               # 左→右(L2R)解码器层数
    r_num_blocks: 3             # 右→左(R2L)解码器层数 ← U2++ 的“++”关键
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.0
    src_attention_dropout_rate: 0.0

# -------- 混合 CTC / Attention 损失 --------
model_conf:
    ctc_weight: 0.3             # 总损失里 CTC 占比
    lsm_weight: 0.1             # label smoothing
    length_normalized_loss: false
    reverse_weight: 0.3         # 右→左解码器损失占比（U2++ 特有）

# -------- 数据与特征 --------
dataset_conf:
    filter_conf:
        max_length: 2000        # 帧数上限（指令很短，设小一点）
        min_length: 10
        token_max_length: 100
        token_min_length: 1
    resample_conf:
        resample_rate: 16000
    speed_perturb: true         # 速度扰动数据增强(0.9/1.0/1.1倍速)
    fbank_conf:
        num_mel_bins: 80
        frame_shift: 10
        frame_length: 25
        dither: 1.0
    spec_aug: true              # SpecAugment 频谱掩蔽数据增强
    spec_aug_conf:
        num_t_mask: 2
        num_f_mask: 2
        max_t: 50
        max_f: 10
    shuffle: true
    shuffle_conf:
        shuffle_size: 1500
    sort: true
    sort_conf:
        sort_size: 200
    batch_conf:
        batch_type: 'static'
        batch_size: 16

# -------- 优化器 / 训练 --------
grad_clip: 5
accum_grad: 1
max_epoch: 60                   # 数据少，可适当多训几轮
log_interval: 20

optim: adam
optim_conf:
    lr: 0.001
scheduler: warmuplr
scheduler_conf:
    warmup_steps: 500
