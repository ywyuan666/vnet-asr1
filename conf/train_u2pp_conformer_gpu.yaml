# ============================================================
#  U2++ Conformer 训练配置 —— GPU 版（AutoDL / RTX 4090·5090 等）
# ------------------------------------------------------------
#  与 CPU 版(train_u2pp_conformer.yaml)的区别：
#    - 模型更大(output_size 144→256, num_blocks 6→12, linear_units 1024→2048)
#      → 标准 U2++ 规格，GPU 算得动，精度更好
#    - batch_size 16→36 → 吃满显存、收敛更快
#  显存参考：RTX 4090/5090(24~32GB) 完全够用；若报 OOM 把 batch_size 调小即可
#  用法：  config=conf/train_u2pp_conformer_gpu.yaml num_workers=8 bash run.sh
# ============================================================

# -------- 编码器：Conformer（自注意力 + 卷积） --------
encoder: conformer
encoder_conf:
    output_size: 256            # 编码器隐藏维度（GPU 版调大，标准规格）
    attention_heads: 4          # 多头注意力头数
    linear_units: 2048          # 前馈层维度（GPU 版调大）
    num_blocks: 12              # Conformer 层数（标准 U2++ 为 12）
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    attention_dropout_rate: 0.0
    input_layer: conv2d         # 前端 2 次下采样(4x)
    normalize_before: true
    cnn_module_kernel: 15       # 卷积模块卷积核
    use_cnn_module: true
    activation_type: swish
    pos_enc_layer_type: rel_pos        # 相对位置编码
    selfattention_layer_type: rel_selfattn
    causal: true                # 因果卷积 → 支持流式
    use_dynamic_chunk: true     # 动态 chunk → 流式/非流式统一训练
    cnn_module_norm: layer_norm
    use_dynamic_left_chunk: false

# -------- 解码器：bitransformer（双向：左→右 + 右→左）--------
decoder: bitransformer
decoder_conf:
    attention_heads: 4
    linear_units: 2048          # GPU 版调大，与编码器匹配
    num_blocks: 3               # 左→右(L2R)解码器层数
    r_num_blocks: 3             # 右→左(R2L)解码器层数 ← U2++ 的“++”关键
    dropout_rate: 0.1
    positional_dropout_rate: 0.1
    self_attention_dropout_rate: 0.0
    src_attention_dropout_rate: 0.0

# -------- Tokenizer / CMVN / 模型类型（WeNet main 分支必需）--------
tokenizer: char
tokenizer_conf:
    symbol_table_path: data/dict/units.txt
    split_with_space: false
    bpe_path: null
    non_lang_syms_path: null
    is_multilingual: false
    num_languages: 1

ctc: ctc
ctc_conf:
    ctc_blank_id: 0

cmvn: global_cmvn
cmvn_conf:
    cmvn_file: data/train/global_cmvn
    is_json_cmvn: true

model: asr_model
dataset: asr

# -------- 混合 CTC / Attention 损失 --------
model_conf:
    ctc_weight: 0.3             # 总损失里 CTC 占比
    lsm_weight: 0.1             # label smoothing
    length_normalized_loss: false
    reverse_weight: 0.3         # 右→左解码器损失占比（U2++ 特有）

# -------- 数据与特征 --------
dataset_conf:
    filter_conf:
        max_length: 2000        # 帧数上限（指令很短，设小一点）
        min_length: 10
        token_max_length: 100
        token_min_length: 1
    resample_conf:
        resample_rate: 16000
    speed_perturb: true         # 速度扰动数据增强(0.9/1.0/1.1倍速)
    fbank_conf:
        num_mel_bins: 80
        frame_shift: 10
        frame_length: 25
        dither: 1.0
    spec_aug: true              # SpecAugment 频谱掩蔽数据增强
    spec_aug_conf:
        num_t_mask: 2
        num_f_mask: 2
        max_t: 50
        max_f: 10
    spec_sub: false
    spec_trim: false
    shuffle: true
    shuffle_conf:
        shuffle_size: 1500
    sort: true
    sort_conf:
        sort_size: 200
    batch_conf:
        batch_type: 'static'
        batch_size: 36          # GPU 版调大，吃满显存、收敛更快（OOM 就调小）

# -------- 优化器 / 训练 --------
grad_clip: 5
accum_grad: 1
max_epoch: 80                   # GPU 训练快，多训几轮把小数据学充分
log_interval: 20

optim: adam
optim_conf:
    lr: 0.001
scheduler: warmuplr
scheduler_conf:
    warmup_steps: 500
