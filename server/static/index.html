<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语音指令识别 · Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; color: #1a1a1a;
    }
    .card {
      background: rgba(255,255,255,.95); border-radius: 20px; box-shadow: 0 25px 80px rgba(0,0,0,.4);
      width: 100%; max-width: 520px; padding: 32px 28px; backdrop-filter: blur(10px);
    }
    h1 { font-size: 22px; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 2px; }
    .sub { text-align: center; color: #7a8ba0; font-size: 12px; margin-bottom: 6px; }
    .tags { display: flex; gap: 4px; justify-content: center; margin-bottom: 6px; }
    .tags span { background: #eef4fb; color: #5a7db0; font-size: 10px; padding: 2px 8px; border-radius: 8px; }
    .status { text-align: center; font-size: 12px; margin-bottom: 18px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .ok { background: #2ecc71; } .bad { background: #e74c3c; } .warn { background: #f39c12; }
    .cmds { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
    .cmds span { background: linear-gradient(135deg,#667eea22,#764ba222); color: #5a3d8a; font-size: 12px; padding: 4px 12px; border-radius: 14px; border: 1px solid #667eea33; }
    .row { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn {
      flex: 1; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform .1s, box-shadow .2s; color: #fff;
    }
    .btn:active { transform: scale(.96); }
    .btn-rec { background: linear-gradient(135deg,#ff6b6b,#ee5253); }
    .btn-rec.recording { background: linear-gradient(135deg,#c0392b,#96281b); animation: pulse 1s infinite; }
    .btn-up { background: linear-gradient(135deg,#667eea,#764ba2); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    .mode-bar { display: flex; gap: 4px; margin-bottom: 14px; }
    .mode-btn {
      flex: 1; border: 1px solid #d5dce6; border-radius: 8px; padding: 6px 0; font-size: 11px;
      cursor: pointer; background: #f7f9fc; color: #5a7db0; transition: .15s;
    }
    .mode-btn.active { background: #667eea; color: #fff; border-color: #667eea; }
    .drop {
      border: 2px dashed #c3ceda; border-radius: 12px; padding: 16px; text-align: center;
      color: #8a97a6; font-size: 13px; margin-bottom: 16px; transition: .2s;
    }
    .drop.over { border-color: #667eea; background: #f5f8ff; color: #667eea; }
    .result {
      background: #f7f9fc; border-radius: 14px; padding: 20px; min-height: 90px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    }
    .result .label { font-size: 12px; color: #8a97a6; }
    .result .text { font-size: 28px; font-weight: 700; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 3px; }
    .result .meta { font-size: 11px; color: #aab4c0; }
    .spinner { width: 26px; height: 26px; border: 3px solid #dfe6ee; border-top-color: #667eea; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg) } }
    .footer { text-align: center; font-size: 11px; color: #b0bac6; margin-top: 16px; }
    input[type=file] { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>语音指令识别</h1>
    <p class="sub">Conformer · CTC / Attention / Transducer 端到端中文语音识别</p>
    <div class="tags">
      <span>下一首</span><span>打开降噪</span><span>接听电话</span>
      <span>调高音量</span><span>暂停播放</span><span>查询电量</span>
    </div>
    <p class="status"><span id="dot" class="dot bad"></span><span id="statusText">检查模型状态…</span></p>

    <div class="row">
      <button id="recBtn" class="btn btn-rec">🎤 按住说话</button>
      <button id="upBtn" class="btn btn-up">📁 上传音频</button>
    </div>
    <input type="file" id="fileInput" accept="audio/*" />

    <div class="mode-bar">
      <button class="mode-btn" data-mode="attention">Attention</button>
      <button class="mode-btn" data-mode="transducer">Transducer</button>
      <button class="mode-btn" data-mode="ctc_greedy">CTC</button>
    </div>

    <div id="drop" class="drop">把 wav / mp3 音频拖到这里识别</div>

    <div class="result" id="result">
      <div class="label">识别结果将显示在这里</div>
    </div>

    <p class="footer">POST /api/recognize · 真实 PyTorch 模型推理 · 三种解码模式可选</p>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const resultBox = $("result");
    let currentMode = "attention";

    // ---------- 解码模式切换 ----------
    document.querySelectorAll(".mode-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentMode = btn.dataset.mode;
      });
    });
    document.querySelector(".mode-btn[data-mode='attention']").classList.add("active");

    // ---------- 健康检查 ----------
    async function checkHealth() {
      try {
        const r = await fetch("/api/health");
        const d = await r.json();
        if (d.model_ready) {
          $("dot").className = "dot ok";
          $("statusText").textContent = "模型就绪 · " + d.decode_mode + " 模式";
        } else {
          $("dot").className = "dot warn";
          $("statusText").textContent = "模型未就绪：请先训练或挂载模型";
        }
      } catch (e) {
        $("statusText").textContent = "无法连接后端";
      }
    }
    checkHealth();

    // ---------- 展示结果 ----------
    function showLoading() {
      resultBox.innerHTML = '<div class="spinner"></div><div class="label">识别中…</div>';
    }
    function showResult(text, meta) {
      resultBox.innerHTML =
        '<div class="label">识别结果</div>' +
        '<div class="text">' + text + '</div>' +
        '<div class="meta">' + meta + '</div>';
    }
    function showError(msg) {
      resultBox.innerHTML = '<div class="label" style="color:#e74c3c">出错：' + msg + '</div>';
    }

    // ---------- 上传识别 ----------
    async function sendAudio(blob, filename) {
      showLoading();
      const fd = new FormData();
      fd.append("audio", blob, filename);
      fd.append("mode", currentMode);
      try {
        const r = await fetch("/api/recognize", { method: "POST", body: fd });
        const d = await r.json();
        if (!r.ok) { showError(d.detail || "识别失败"); return; }
        showResult(d.text, "耗时 " + d.elapsed_sec + "s · " + d.decode_mode);
      } catch (e) { showError(e.message); }
    }

    // ---------- 文件上传 ----------
    $("upBtn").onclick = () => $("fileInput").click();
    $("fileInput").onchange = (e) => {
      if (e.target.files[0]) sendAudio(e.target.files[0], e.target.files[0].name);
    };

    // ---------- 拖拽上传 ----------
    const drop = $("drop");
    drop.ondragover = (e) => { e.preventDefault(); drop.classList.add("over"); };
    drop.ondragleave = () => drop.classList.remove("over");
    drop.ondrop = (e) => {
      e.preventDefault(); drop.classList.remove("over");
      if (e.dataTransfer.files[0]) sendAudio(e.dataTransfer.files[0], e.dataTransfer.files[0].name);
    };

    // ---------- 麦克风录音 ----------
    let mediaRecorder = null, chunks = [];
    const recBtn = $("recBtn");

    async function startRec() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: "audio/webm" });
          sendAudio(blob, "mic.webm");
          stream.getTracks().forEach((t) => t.stop());
        };
        mediaRecorder.start();
        recBtn.classList.add("recording");
        recBtn.textContent = "🔴 松开识别";
      } catch (e) {
        showError("无法访问麦克风：" + e.message);
      }
    }
    function stopRec() {
      if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop();
      recBtn.classList.remove("recording");
      recBtn.textContent = "🎤 按住说话";
    }
    recBtn.onmousedown = startRec;
    recBtn.onmouseup = stopRec;
    recBtn.onmouseleave = () => { if (mediaRecorder && mediaRecorder.state === "recording") stopRec(); };
    recBtn.ontouchstart = (e) => { e.preventDefault(); startRec(); };
    recBtn.ontouchend = (e) => { e.preventDefault(); stopRec(); };
  </script>
</body>
</html>
